<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - SmartInventory Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Sora",sans-serif;}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f6f4ef;color:#0f172a;padding:24px;}
.card{width:100%;max-width:420px;background:#fff;border-radius:16px;padding:22px;box-shadow:0 18px 45px rgba(15,23,42,0.08);}
h2{font-size:22px;margin-bottom:6px;}
p{font-size:13px;color:#5b6770;margin-bottom:16px;}
label{font-size:12px;color:#5b6770;}
input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #e6e2dc;margin:6px 0 12px;}
button{width:100%;padding:10px 12px;border:none;border-radius:10px;background:#0ea5a4;color:#fff;font-weight:600;cursor:pointer;}
button.secondary{background:#e2e8f0;color:#0f172a;margin-top:8px;}
.note{font-size:12px;color:#5b6770;margin-top:10px;}
.status{font-size:12px;margin-top:12px;}
.row{display:grid;gap:6px;}
.site-footer{margin-top:18px;text-align:center;font-size:12px;color:#5b6770;}
</style>
</head>
<body>
<div class="card">
  <h2>Reset Password</h2>
  <p>We will email a one-time code to reset your password.</p>

  <div class="row">
    <label>Email Address</label>
    <input id="email" type="email" placeholder="you@example.com">
    <button onclick="requestCode()">Send Reset Code</button>
  </div>

  <hr style="border:none;border-top:1px solid #e6e2dc;margin:18px 0;">

  <div class="row">
    <label>Reset Code</label>
    <input id="code" placeholder="6-digit code">
    <label>New Password</label>
    <input id="newPassword" type="password" placeholder="At least 8 chars, upper, lower, number">
    <button onclick="confirmReset()">Reset Password</button>
    <button class="secondary" onclick="window.location.href='index.html'">Back to Login</button>
  </div>

  <div id="status" class="status"></div>
  <div class="note">If you do not receive a code, check spam or contact admin.</div>
</div>

<footer class="site-footer" id="siteFooter">Copyright &copy; 2026 SmartInventory Pro. All rights reserved.</footer>

<script>
async function loadFooterText(){
  try{
    const res = await fetch("/api/public/settings");
    if(!res.ok) return;
    const data = await res.json();
    document.getElementById("siteFooter").textContent = data.site_footer_text || "Copyright © 2026 SmartInventory Pro. All rights reserved.";
  }catch(err){
    // ignore footer load failure
  }
}

async function requestCode(){
  const email = document.getElementById("email").value.trim();
  const status = document.getElementById("status");
  status.textContent = "Sending code...";
  try{
    const res = await fetch("/api/auth/reset/request", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if(!res.ok){
      status.textContent = data.error || "Unable to send code.";
      return;
    }
    status.textContent = "Reset code sent. Check your email.";
  }catch(err){
    status.textContent = "Unable to connect to server.";
  }
}

async function confirmReset(){
  const email = document.getElementById("email").value.trim();
  const code = document.getElementById("code").value.trim();
  const newPassword = document.getElementById("newPassword").value;
  const status = document.getElementById("status");
  status.textContent = "Resetting password...";
  try{
    const res = await fetch("/api/auth/reset/confirm", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, code, new_password: newPassword })
    });
    const data = await res.json();
    if(!res.ok){
      status.textContent = data.error || "Unable to reset password.";
      return;
    }
    status.textContent = "Password reset successfully. You can log in now.";
  }catch(err){
    status.textContent = "Unable to connect to server.";
  }
}

loadFooterText();
</script>
</body>
</html>
