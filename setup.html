<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup — SmartInventory Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;}
.setup-box{background:white;padding:40px;border-radius:12px;width:100%;max-width:420px;box-shadow:0 15px 40px rgba(0,0,0,0.3);text-align:center;}
h2{margin-bottom:10px;color:#2c5364;}
p{margin-bottom:20px;color:#777;}
.note{font-size:12px;color:#888;margin-top:-8px;margin-bottom:10px;}
input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ccc;}
button{width:100%;padding:12px;background:#2c5364;color:white;border:none;border-radius:8px;font-size:16px;margin-top:15px;cursor:pointer;}
button:hover{background:#203a43;}
.site-footer{margin-top:18px;text-align:center;font-size:12px;color:rgba(255,255,255,0.78);}
</style>
</head>
<body>

<div class="setup-box">
<h2>📦 SmartInventory Setup</h2>
<p>Create your first admin account</p>
<form id="setupForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <div class="note">Password must be at least 8 characters with upper, lower, and number.</div>
    <button type="submit">Create Admin</button>
</form>
</div>

<footer class="site-footer" id="siteFooter">Copyright &copy; 2026 SmartInventory Pro. All rights reserved.</footer>

<script>
async function loadFooterText(){
    try{
        const res = await fetch("/api/public/settings");
        if(!res.ok) return;
        const data = await res.json();
        document.getElementById("siteFooter").textContent = data.site_footer_text || "Copyright © 2026 SmartInventory Pro. All rights reserved.";
    }catch(err){
        // ignore footer load failure
    }
}

fetch("/api/setup/status").then(r=>r.json()).then(data=>{
    if(!data.needsSetup){
        window.location.href = "index.html";
    }
}).catch(()=>{});

document.getElementById("setupForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/api/setup",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,email,password})
    });
    const data = await res.json();
    if(!res.ok){alert(data.error || "Setup failed");return;}
    alert("Admin created. Please log in.");
    window.location.href = "index.html";
});

loadFooterText();
</script>
</body>
</html>
